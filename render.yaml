# render.yaml — Render.com deployment configuration
#
# Deploys the FastAPI backend only.
# Database : Neon PostgreSQL (neon.tech) — set DATABASE_URL manually.
# Redis    : Upstash Redis (upstash.com)  — set REDIS_URL manually.
# Frontend : Vercel — deployed separately via vercel.json.

services:
  - type: web
    name: protein-intelligence-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    plan: free
    autoDeploy: true

    envVars:
      # Neon connection string — get from neon.tech dashboard.
      # Format: postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false

      # Upstash Redis URL — get from upstash.com dashboard.
      # Format: rediss://default:password@xxx.upstash.io:6379
      - key: REDIS_URL
        sync: false

      # Your Vercel frontend URL — set after Vercel deploy, then redeploy backend.
      # Example: https://protein-intelligence.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false

      - key: PYTHON_VERSION
        value: 3.11.0

      - key: DEBUG
        value: "false"

      # Optional: free NCBI key for higher ClinVar rate limits (10 req/s vs 3).
      # Get at: https://www.ncbi.nlm.nih.gov/account/
      # - key: NCBI_API_KEY
      #   sync: false
